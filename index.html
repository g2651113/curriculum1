<title>都市生活学部履修登録</title>

  /* スマホ・タブレット対応の余白 */
  body {
    margin: 20px;
    padding: 20px;
    background-color: #ffffff;
  }

  /* 全体を中央寄せ＆左右に余白 */
  #page-wrapper {
    max-width: 1200px;
    margin: auto;
  }

  /* 水色テーマ */
  table {
    border-collapse: collapse;
    table-layout: fixed;
    width: 720px; /* 120px × 6列 */
  }

  th, td {
    border: 1px solid #4aa3df;
    width: 120px;
    height: 60px;
    text-align: center;
    word-wrap: break-word;
    white-space: normal;
  }

  th { background-color: #cfe8ff; }
  .required { background-color: #d9f0ff; font-weight: bold; }
  .registered { background-color: #d9ffd9; font-weight: bold; }

  /* テーブルがスマホで潰れないように横スクロール */
  #table-wrapper {
    overflow-x: auto;
    margin-bottom: 20px;
  }

  /* テーブルとチャットを横並び（画面が狭いときは縦並び） */
  #main-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  /* 科目候補と口コミを左右に並べる（画面が狭いときは縦並び） */
  #lower-wrapper {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  #subject-list, #review-box {
    border: 1px solid #4aa3df;
    padding: 10px;
    width: 300px;
    max-width: 100%;
    background-color: #f2f8ff;
  }
